<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webflow JSON Gallery</title>
  <style>
    :root {
      --bg: #07090f;
      --bg2: #0a0d15;
      --panel: #0f121b;
      --panel2: #121726;
      --line: #262c3c;
      --line2: #30394f;
      --text: #e8edf8;
      --muted: #99a3ba;
      --blue: #5a62ff;
      --blue2: #7f86ff;
      --orange: #ff8a5b;
      --green: #23c38b;
      --danger: #ff6b6b;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 0% 0%, #1c2233 0%, var(--bg) 38%), linear-gradient(180deg, #0b0e16 0%, #07090f 100%);
      color: var(--text);
      font-family: "Satoshi", "Syne", "Segoe UI", system-ui, sans-serif;
    }

    .app {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: #0a0c12;
      border-right: 1px solid var(--line);
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -.02em;
      padding: 8px 10px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(90,98,255,.15), rgba(127,134,255,.06));
      border: 1px solid rgba(90,98,255,.32);
    }

    .brand-dot {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--blue), #8d65ff);
      box-shadow: 0 0 14px rgba(90,98,255,.5);
    }

    .side-title {
      font-size: 11px;
      letter-spacing: .1em;
      color: var(--muted);
      text-transform: uppercase;
      margin: 4px 0 6px;
      padding: 0 8px;
    }

    .tag-list {
      display: grid;
      gap: 6px;
    }

    .filter-select {
      width: 100%;
      border: 1px solid var(--line2);
      border-radius: 9px;
      background: #111522;
      color: var(--text);
      padding: 9px 10px;
      font-size: 13px;
      outline: none;
    }

    .tag-btn {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      color: #a9b0c2;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      text-transform: capitalize;
      font-size: 13px;
    }

    .tag-btn:hover { background: #111522; color: #d5ddf0; }
    .tag-btn.active {
      background: linear-gradient(135deg, rgba(90,98,255,.2), rgba(90,98,255,.08));
      border-color: rgba(90,98,255,.5);
      color: #fff;
    }

    .count {
      font-size: 11px;
      color: var(--muted);
      min-width: 18px;
      text-align: right;
    }

    .content {
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-width: 0;
    }

    .topbar {
      border-bottom: 1px solid var(--line);
      background: rgba(8,10,16,.92);
      backdrop-filter: blur(8px);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .search {
      flex: 1;
      min-width: 260px;
      max-width: 700px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line2);
      border-radius: 10px;
      background: #0f1118;
      padding: 8px 10px;
    }

    .search input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--line2);
      background: #141a2a;
      color: var(--text);
      border-radius: 9px;
      padding: 8px 11px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
    }

    .primary {
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      border-color: rgba(90,98,255,.5);
      color: white;
    }

    .danger {
      background: #2a1717;
      color: #ffc8c8;
      border-color: #6b2a2a;
    }

    .hero {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 6px;
    }

    .hero h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.1;
      color: #f2f5ff;
      letter-spacing: -.02em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      max-width: 840px;
      line-height: 1.5;
    }

    .board {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      align-content: start;
    }

    .canvas-zone {
      margin: 0 16px 16px;
      border: 1px solid var(--line2);
      border-radius: 12px;
      background: linear-gradient(180deg, #0f141f, #0b1018);
      overflow: hidden;
    }

    .canvas-head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .canvas-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .canvas-frame {
      width: 100%;
      height: 360px;
      border: none;
      display: block;
      background: #0a0a0a;
    }

    .card {
      border: 1px solid var(--line2);
      border-radius: 20px;
      background:
        radial-gradient(circle at top, rgba(127,134,255,.16), transparent 38%),
        linear-gradient(180deg, rgba(17,22,34,.98), rgba(10,14,24,.98));
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 320px;
      box-shadow: 0 18px 40px rgba(0,0,0,.24);
      transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(127,134,255,.42);
      box-shadow: 0 26px 60px rgba(0,0,0,.34);
    }

    .card-head {
      padding: 14px 14px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .name {
      font-size: 14px;
      font-weight: 800;
      margin: 0;
    }

    .meta {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 11px;
    }

    .plan-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 54px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      border: 1px solid transparent;
    }

    .plan-badge.free {
      background: rgba(35, 195, 139, .12);
      color: #8df0c8;
      border-color: rgba(35, 195, 139, .36);
    }

    .plan-badge.pro {
      background: rgba(255, 138, 91, .12);
      color: #ffc2ab;
      border-color: rgba(255, 138, 91, .36);
    }

    .visual-preview {
      position: relative;
      border: 1px solid rgba(72,86,118,.5);
      border-radius: 18px;
      margin: 14px;
      min-height: 220px;
      overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(127,134,255,.28), transparent 30%),
        linear-gradient(145deg, #1a2440, #0d1422 72%);
      isolation: isolate;
    }

    .visual-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #f6f8fc;
      transform: scale(1.01);
      transform-origin: center center;
      transition: transform 260ms ease, filter 260ms ease;
      filter: saturate(1.04) contrast(1.01);
      overflow: auto;
    }

    .card:hover .visual-frame {
      transform: scale(1.06);
      filter: saturate(1.08) contrast(1.03);
    }

    .visual-fallback {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      color: #d6def0;
      font-size: 12px;
      text-align: center;
      z-index: 0;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 0 14px 14px;
      margin-top: auto;
    }

    .empty {
      border: 1px dashed #314056;
      border-radius: 12px;
      color: var(--muted);
      padding: 16px;
      text-align: center;
    }

    .dock {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: min(430px, calc(100vw - 30px));
      background: #0f131f;
      border: 1px solid var(--line2);
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(0,0,0,.45);
      overflow: hidden;
      z-index: 20;
      display: none;
    }

    .dock-head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .dock-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .dock-body { padding: 10px; display: grid; gap: 8px; }

    .field {
      display: grid;
      gap: 4px;
    }

    .field label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }

    .field input, .field textarea {
      width: 100%;
      border: 1px solid var(--line2);
      border-radius: 9px;
      background: #0a101b;
      color: var(--text);
      padding: 9px;
      font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .field textarea { min-height: 120px; resize: vertical; }

    .dock-actions { display: flex; gap: 7px; flex-wrap: wrap; }
    .status { min-height: 16px; font-size: 12px; color: var(--muted); }
    .ok { color: #90e3c1 !important; }
    .bad { color: #ffb0b0 !important; }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--line); }
      .tag-list { display: none; }
      .dock { position: static; width: auto; margin: 10px 16px 16px; }
      .content { grid-template-rows: auto auto auto 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><span class="brand-dot"></span><span>Flow Gallery</span></div>
      <div>
        <div class="side-title">Filters</div>
        <select id="tierFilter" class="filter-select">
          <option value="free">Free</option>
          <option value="pro">Pro</option>
        </select>
        <div class="tag-list" id="tagList"></div>
      </div>
    </aside>

    <section class="content">
      <div class="topbar">
        <div class="search">
          <span>🔎</span>
          <input id="searchInput" type="text" placeholder="Search examples by name or tags..." />
        </div>
        <div class="toolbar">
          <button id="openDock" class="primary">+ Add Example</button>
          <button id="seedBtn">Load Demo Examples</button>
          <button id="exportBtn">Export JSON</button>
        </div>
      </div>

      <div class="hero">
        <h1>Webflow Section JSON Gallery</h1>
        <p>Webflow se copied section JSON yahan save karo. Har card ke niche <b>Webflow</b> button hai jo direct Webflow-compatible clipboard format me copy karta hai.</p>
      </div>

      <div class="board" id="list"></div>
      <div class="canvas-zone">
        <div class="canvas-head">
          <button id="previewCanvasBtn" class="primary">Show Canvas Preview</button>
          <div class="canvas-meta" id="canvasMeta">No preview yet.</div>
        </div>
        <iframe id="canvasFrame" class="canvas-frame" title="Canvas Preview"></iframe>
      </div>
    </section>
  </div>

  <div class="dock" id="dock">
    <div class="dock-head">
      <div class="dock-title">Add / Update Example</div>
      <button id="closeDock">✕</button>
    </div>
    <div class="dock-body">
      <div class="field">
        <label for="exName">Example Name</label>
        <input id="exName" type="text" placeholder="Hero Section v1" />
      </div>
      <div class="field">
        <label for="exTags">Tags (comma-separated)</label>
        <input id="exTags" type="text" placeholder="hero, navbar, pricing" />
      </div>
      <div class="field">
        <label for="jsonInput">Webflow JSON</label>
        <textarea id="jsonInput" placeholder='{"type":"@webflow/XscpData","payload":{...}}'></textarea>
      </div>
      <div class="dock-actions">
        <button class="primary" id="saveBtn">Save Example</button>
        <button id="pasteBtn">Paste Clipboard</button>
        <button id="clearBtn">Clear</button>
      </div>
      <div class="status" id="status">Ready.</div>
    </div>
  </div>

  <script>
    const KEY = 'wf_json_examples_v1';
    const PRO_LIBRARY_URL = 'webflow-json-examples-1774894530241.json';

    const listEl = document.getElementById('list');
    const tagListEl = document.getElementById('tagList');
    const statusEl = document.getElementById('status');
    const exName = document.getElementById('exName');
    const exTags = document.getElementById('exTags');
    const jsonInput = document.getElementById('jsonInput');
    const searchInput = document.getElementById('searchInput');
    const tierFilter = document.getElementById('tierFilter');
    const dock = document.getElementById('dock');
    const previewCanvasBtn = document.getElementById('previewCanvasBtn');
    const canvasMeta = document.getElementById('canvasMeta');
    const canvasFrame = document.getElementById('canvasFrame');

    let items = [];
    let activeTag = '';
    let activeTier = 'free';
    let query = '';
    let selectedPreviewIdx = null;
    let proLibraryLoaded = false;

    function showStatus(msg, bad) {
      statusEl.textContent = msg;
      statusEl.className = bad ? 'status bad' : 'status ok';
    }

    function load() {
      try {
        const raw = localStorage.getItem(KEY);
        if (!raw) { items = []; return; }
        const parsed = JSON.parse(raw);
        items = Array.isArray(parsed) ? parsed : [];
      } catch (_) {
        items = [];
      }
    }

    function save() {
      localStorage.setItem(KEY, JSON.stringify(items));
    }

    function itemKey(item) {
      return `${String(item?.name || '').trim().toLowerCase()}::${String(item?.json || '').trim()}`;
    }

    function normalizeImportedItems(arr) {
      if (!Array.isArray(arr)) return [];
      return arr
        .filter(Boolean)
        .map((item) => ({
          ...item,
          tier: item?.tier || (String(item?.plan || '').toLowerCase() === 'premium' ? 'pro' : item?.tier),
          updatedAt: Number(item?.updatedAt) || 0
        }));
    }

    async function loadProLibrary() {
      if (proLibraryLoaded) return;
      try {
        const res = await fetch(PRO_LIBRARY_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const raw = await res.json();
        const imported = normalizeImportedItems(raw);
        if (!imported.length) {
          proLibraryLoaded = true;
          return;
        }

        const existing = new Set(items.map(itemKey));
        imported.forEach((item) => {
          const key = itemKey(item);
          if (existing.has(key)) return;
          existing.add(key);
          items.push(item);
        });

        proLibraryLoaded = true;
        render();
      } catch (e) {
        console.warn('Unable to load Pro library:', e);
      }
    }

    function escapeHtml(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function normalizeJson(text) {
      const parsed = JSON.parse(text);

      // Support wrapped API format: {"code":"{...@webflow/XscpData...}"}
      if (parsed && typeof parsed.code === 'string') {
        const inner = JSON.parse(parsed.code);
        return JSON.stringify(inner);
      }

      // Support nested payload wrappers if any source sends them.
      if (parsed && parsed.payload && typeof parsed.payload.code === 'string') {
        const inner = JSON.parse(parsed.payload.code);
        return JSON.stringify(inner);
      }

      return JSON.stringify(parsed);
    }

    function wfId() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    function makeDemoJson(headline, sub, image) {
      const sectionId = wfId();
      const containerId = wfId();
      const hId = wfId();
      const pId = wfId();
      const imgId = wfId();
      const t1 = wfId();
      const t2 = wfId();
      const clsSection = wfId();
      const clsContainer = wfId();
      const clsTitle = wfId();
      const clsSub = wfId();
      const clsImg = wfId();

      return JSON.stringify({
        type: "@webflow/XscpData",
        payload: {
          nodes: [
            { _id: sectionId, type: "Section", tag: "section", classes: [clsSection], children: [containerId], data: { tag: "section", devlink: { runtimeProps: {}, slot: "" }, displayName: "", attr: { id: "" }, xattr: [], search: { exclude: false }, visibility: { conditions: [] } } },
            { _id: containerId, type: "Block", tag: "div", classes: [clsContainer], children: [hId, pId, imgId], data: { text: false, tag: "div", devlink: { runtimeProps: {}, slot: "" }, displayName: "", attr: { id: "" }, xattr: [], search: { exclude: false }, visibility: { conditions: [] } } },
            { _id: hId, type: "Heading", tag: "h2", classes: [clsTitle], children: [t1], data: { tag: "h2", devlink: { runtimeProps: {}, slot: "" }, displayName: "", attr: { id: "" }, xattr: [], search: { exclude: false }, visibility: { conditions: [] } } },
            { _id: t1, text: true, v: headline },
            { _id: pId, type: "Paragraph", tag: "p", classes: [clsSub], children: [t2], data: { devlink: { runtimeProps: {}, slot: "" }, displayName: "", attr: { id: "" }, xattr: [], search: { exclude: false }, visibility: { conditions: [] } } },
            { _id: t2, text: true, v: sub },
            { _id: imgId, type: "Image", tag: "img", classes: [clsImg], children: [], data: { img: {}, srcsetDisabled: false, attr: { width: "auto", height: "auto", alt: "preview", src: image, loading: "auto", id: "" }, sizes: [], devlink: { runtimeProps: {}, slot: "" }, displayName: "", xattr: [], search: { exclude: false }, visibility: { conditions: [] } } }
          ],
          styles: [
            { _id: clsSection, fake: false, type: "class", name: "demo-section", namespace: "", comb: "", styleLess: "padding-top: 72px; padding-right: 5%; padding-bottom: 72px; padding-left: 5%; background: #f8fafc;", variants: {}, children: [], createdBy: null, origin: null, selector: null },
            { _id: clsContainer, fake: false, type: "class", name: "demo-container", namespace: "", comb: "", styleLess: "width: 100%; max-width: 72rem; margin-right: auto; margin-left: auto; display: flex; flex-direction: column; row-gap: 12px;", variants: {}, children: [], createdBy: null, origin: null, selector: null },
            { _id: clsTitle, fake: false, type: "class", name: "demo-title", namespace: "", comb: "", styleLess: "font-size: 2rem; color: #0f172a;", variants: {}, children: [], createdBy: null, origin: null, selector: null },
            { _id: clsSub, fake: false, type: "class", name: "demo-sub", namespace: "", comb: "", styleLess: "color: #64748b; font-size: 1rem; line-height: 1.6;", variants: {}, children: [], createdBy: null, origin: null, selector: null },
            { _id: clsImg, fake: false, type: "class", name: "demo-image", namespace: "", comb: "", styleLess: "width: 100%; border-top-left-radius: 16px; border-top-right-radius: 16px; border-bottom-right-radius: 16px; border-bottom-left-radius: 16px;", variants: {}, children: [], createdBy: null, origin: null, selector: null }
          ],
          assets: [],
          ix1: [],
          ix2: { interactions: [], events: [], actionLists: [] }
        },
        meta: {
          droppedLinks: 0,
          dynBindRemovedCount: 0,
          dynListBindRemovedCount: 0,
          paginationRemovedCount: 0,
          universalBindingsRemovedCount: 0,
          unlinkedSymbolCount: 0,
          codeComponentsRemovedCount: 0
        }
      });
    }

    function getDemoItems() {
      return [
        {
          name: 'Enterprise SaaS Hero',
          tags: 'hero, saas, enterprise, conversion',
          json: makeDemoJson(
            'Scale product storytelling with a modular hero system',
            'Performance-focused headline, supporting copy, and a visual-first launch block.',
            'https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=1600&auto=format&fit=crop'
          )
        },
        {
          name: 'Feature Grid Pro',
          tags: 'features, grid, product, content',
          json: makeDemoJson(
            'Show product value in structured feature clusters',
            'Reusable feature layout designed for high-scan readability and visual hierarchy.',
            'https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1600&auto=format&fit=crop'
          )
        },
        {
          name: 'Testimonial Wall Pro',
          tags: 'testimonial, trust, social-proof, b2b',
          json: makeDemoJson(
            'Trusted by high-growth product teams',
            'Social proof section optimized for credibility and conversion lift.',
            'https://images.unsplash.com/photo-1521737604893-d14cc237f11d?q=80&w=1600&auto=format&fit=crop'
          )
        },
        {
          name: 'Pricing Comparison Pro',
          tags: 'pricing, plans, comparison',
          json: makeDemoJson(
            'Pricing designed for clear decision-making',
            'Tiered plan narrative with sharp contrast between starter, growth, and scale.',
            'https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?q=80&w=1600&auto=format&fit=crop'
          )
        },
        {
          name: 'Case Study Spotlight',
          tags: 'case-study, storytelling, conversion',
          json: makeDemoJson(
            'From fragmented pages to a unified web engine',
            'Long-form case study section built for measurable business outcomes.',
            'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?q=80&w=1600&auto=format&fit=crop'
          )
        },
        {
          name: 'FAQ Conversion Block',
          tags: 'faq, support, objections',
          json: makeDemoJson(
            'Answer objections before they block conversion',
            'FAQ structure tuned for clarity, trust, and reduced bounce.',
            'https://images.unsplash.com/photo-1450101499163-c8848c66ca85?q=80&w=1600&auto=format&fit=crop'
          )
        },
        {
          name: 'CTA Banner Premium',
          tags: 'cta, banner, marketing',
          json: makeDemoJson(
            'Turn intent into action with one focused CTA',
            'High-contrast action module for product tours, demos, and signups.',
            'https://images.unsplash.com/photo-1552581234-26160f608093?q=80&w=1600&auto=format&fit=crop'
          )
        },
        {
          name: 'Blog Cards Editorial',
          tags: 'blog, content, editorial',
          json: makeDemoJson(
            'Editorial cards that support growth content',
            'Modern article card section with strong typography and metadata rhythm.',
            'https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?q=80&w=1600&auto=format&fit=crop'
          )
        },
        {
          name: 'Team Section Executive',
          tags: 'team, company, profile',
          json: makeDemoJson(
            'Highlight the people behind the product',
            'Leadership-focused section for trust, authority, and brand personality.',
            'https://images.unsplash.com/photo-1522071820081-009f0129c71c?q=80&w=1600&auto=format&fit=crop'
          )
        },
        {
          name: 'Footer Multi-Column Pro',
          tags: 'footer, navigation, links',
          json: makeDemoJson(
            'Footer architecture built for large sites',
            'Structured multi-column layout for product, company, resources, and legal.',
            'https://images.unsplash.com/photo-1509395176047-4a66953fd231?q=80&w=1600&auto=format&fit=crop'
          )
        }
      ];
    }

    function extractPreviewFromJson(jsonText) {
      try {
        const parsed = JSON.parse(jsonText);
        if (!parsed || parsed.type !== '@webflow/XscpData' || !parsed.payload) {
          return { title: 'Saved JSON', sub: 'Not a Webflow XscpData payload', image: '', nodes: 0, styles: 0 };
        }

        const nodes = Array.isArray(parsed.payload.nodes) ? parsed.payload.nodes : [];
        const styles = Array.isArray(parsed.payload.styles) ? parsed.payload.styles : [];
        const idMap = new Map(nodes.map(n => [n._id, n]));

        function firstTextFrom(node, depth) {
          if (!node || depth > 4) return '';
          const kids = Array.isArray(node.children) ? node.children : [];
          for (const id of kids) {
            const child = idMap.get(id);
            if (!child) continue;
            if (child.text === true && child.v) return String(child.v).trim();
            const nested = firstTextFrom(child, depth + 1);
            if (nested) return nested;
          }
          return '';
        }

        let title = '';
        let sub = '';
        let image = '';

        for (const n of nodes) {
          if (!title && (n.type === 'Heading' || /^h[1-6]$/i.test(n.tag || ''))) {
            title = firstTextFrom(n, 0);
          }
          if (!sub && (n.type === 'Paragraph' || n.tag === 'p')) {
            sub = firstTextFrom(n, 0);
          }
          if (!image && n.type === 'Image' && n.data && n.data.attr && n.data.attr.src) {
            image = String(n.data.attr.src);
          }
          if (title && sub && image) break;
        }

        return {
          title: title || 'Webflow Section',
          sub: sub || 'Saved section ready to copy into Webflow.',
          image: image || '',
          nodes: nodes.length,
          styles: styles.length
        };
      } catch (_) {
        return { title: 'Saved JSON', sub: 'Unable to parse preview for this item.', image: '', nodes: 0, styles: 0 };
      }
    }

    function tryPrettyJson(raw) {
      const parsed = JSON.parse(raw);
      return JSON.stringify(parsed, null, 2);
    }

    function splitTags(tags) {
      return String(tags || '')
        .split(',')
        .map(t => t.trim().toLowerCase())
        .filter(Boolean);
    }

    function getTier(item) {
      if (item && typeof item.tier === 'string') {
        const explicitTier = item.tier.trim().toLowerCase();
        if (explicitTier === 'free' || explicitTier === 'pro') return explicitTier;
      }

      if (item && typeof item.plan === 'string') {
        const explicitPlan = item.plan.trim().toLowerCase();
        if (explicitPlan === 'premium' || explicitPlan === 'pro') return 'pro';
        if (explicitPlan === 'free') return 'free';
      }

      const tags = splitTags(item && item.tags);
      const proHints = new Set(['pro', 'premium', 'enterprise', 'executive']);
      return tags.some(tag => proHints.has(tag)) ? 'pro' : 'free';
    }

    function buildIdMap(arr) {
      const m = {};
      (arr || []).forEach(x => { m[x._id] = x; });
      return m;
    }

    function buildClassMap(styles) {
      const m = {};
      (styles || []).forEach(s => { m[s._id] = { name: s.name, styleLess: s.styleLess || "" }; });
      return m;
    }

    function buildAssetMap(assets) {
      const m = {};
      (assets || []).forEach(a => { m[a._id] = a.cdnUrl || a.s3Url || ""; });
      return m;
    }

    function resolveAssetTokens(css, assetMap) {
      let out = String(css || "").replace(/@raw<\|([^|]*)\|>/g, (_, val) => val);
      out = out.replace(/@img_([a-f0-9]+)/gi, (_, id) => {
        const url = assetMap[id] || Object.entries(assetMap).find(([k]) => k.includes(id))?.[1] || "";
        return url ? `url('${url}')` : "none";
      });
      return out;
    }

    const TAG_MAP = {
      Block: "div", Section: "div", Container: "div", Heading: null, Paragraph: "p", Image: "img",
      Link: "a", Button: "a", List: "ul", ListItem: "li", RichText: "div", Span: "span"
    };

    function resolveTag(node) {
      if (node.tag) return node.tag;
      if (node.type === "Heading") return `h${node.data?.level || 2}`;
      return TAG_MAP[node.type] || "div";
    }

    function renderNode(nodeId, nodeMap, classMap, assetMap) {
      const node = nodeMap[nodeId];
      if (!node) return "";
      if (node.text === true) return node.v != null ? String(node.v) : "";

      if (node.type === "HtmlEmbed") {
        const html = node.v || node.data?.embed?.meta?.html || "";
        if (String(html).trim().startsWith("<script")) return "";
        const cls = (node.classes || []).map(id => classMap[id]?.name).filter(Boolean).join(" ");
        return `<div${cls ? ` class="${cls}"` : ""}>${html}</div>`;
      }

      let tag = node.tag;
      if (!tag) {
        if (node.type === "DOM") tag = node.data?.tag || "div";
        else if (node.type === "Heading") tag = `h${node.data?.level || 2}`;
        else tag = TAG_MAP[node.type] || "div";
      }

      const classNames = (node.classes || []).map(id => classMap[id]?.name).filter(Boolean).join(" ");
      const classAttr = classNames ? ` class="${classNames}"` : "";
      let extra = "";
      if (tag === "a") extra += ` href="${node.data?.attr?.href || node.data?.link?.url || "#"}"`;

      const xattrs = node.data?.xattr || [];
      xattrs.forEach(x => { if (x.name) extra += ` ${x.name}="${x.value || ""}"`; });
      const domAttrs = node.data?.attributes || [];
      domAttrs.forEach(a => { if (a.name) extra += ` ${a.name}="${a.value || ""}"`; });

      if (tag === "img") {
        const src = node.data?.attr?.src || (node.data?.img?.id ? (assetMap[node.data.img.id] || "") : "");
        return `<img${classAttr} src="${src}" alt="${node.data?.attr?.alt || ""}" style="display:block;max-width:100%;width:auto;height:auto;" />`;
      }

      const inner = (node.children || []).map(cid => renderNode(cid, nodeMap, classMap, assetMap)).join("");
      return `<${tag}${classAttr}${extra}>${inner}</${tag}>`;
    }

    function parseWebflowJSONForCanvas(input) {
      let p = typeof input === "string" ? JSON.parse(input) : input;
      if (!p?.payload) {
        if (p?.nodes) p = { type: "@webflow/XscpData", payload: p };
        else throw new Error("Missing payload — not valid Webflow JSON");
      }
      const { nodes = [], styles = [], assets = [] } = p.payload;
      if (!nodes.length) throw new Error("No nodes found");

      const nodeMap = buildIdMap(nodes);
      const classMap = buildClassMap(styles);
      const assetMap = buildAssetMap(assets);
      const allChildIds = new Set(nodes.flatMap(n => n.text ? [] : (n.children || [])));
      const roots = nodes.filter(n => !n.text && !allChildIds.has(n._id));
      const html = roots.map(n => renderNode(n._id, nodeMap, classMap, assetMap)).join("\n");

      const cssRules = [];
      const seen = new Set();
      styles.forEach(s => {
        if (!s.name || seen.has(s.name) || !s.styleLess?.trim()) return;
        seen.add(s.name);
        const css = resolveAssetTokens(s.styleLess, assetMap);
        const rules = css.split(";").map(r => r.trim()).filter(Boolean).map(r => "  " + r + ";").join("\n");
        cssRules.push(`.${s.name} {\n${rules}\n}`);
        if (s.variants) {
          Object.entries(s.variants).forEach(([v, vd]) => {
            if (!vd.styleLess) return;
            const pseudo = v.includes("hover") ? ":hover" : v.includes("active") ? ":active" : "";
            if (!pseudo) return;
            const vr = resolveAssetTokens(vd.styleLess, assetMap).split(";").map(r => r.trim()).filter(Boolean).map(r => "  " + r + ";").join("\n");
            cssRules.push(`.${s.name}${pseudo} {\n${vr}\n}`);
          });
        }
      });

      return { html, css: cssRules.join("\n\n"), nodes, styles };
    }

    function renderCanvasPreview(html, css) {
      const doc = canvasFrame.contentDocument || canvasFrame.contentWindow?.document;
      if (!doc) throw new Error("Preview frame unavailable");
      doc.open();
      doc.write(buildPreviewDocument(html, css, { mode: 'canvas' }));
      doc.close();
    }

    function buildPreviewDocument(html, css, options = {}) {
      const mode = options.mode || 'card';
      const scale = mode === 'canvas' ? 1 : 0.36;
      const width = mode === 'canvas' ? '100%' : '1200px';
      const viewportHeight = mode === 'canvas' ? 'auto' : '220px';
      const bodyBg = mode === 'canvas' ? '#0a0a0a' : '#f6f8fc';
      const bodyColor = mode === 'canvas' ? '#fff' : '#0f172a';
      const overflow = mode === 'canvas' ? 'hidden' : 'auto';

      return `<!DOCTYPE html><html><head><meta charset="UTF-8"/><style>
        *{box-sizing:border-box;margin:0;padding:0}
        html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:${bodyBg};color:${bodyColor};overflow:${overflow}}
        body{min-height:100vh}
        .preview-viewport{width:100%;height:${viewportHeight};overflow:${overflow};background:${bodyBg}}
        .preview-stage{width:${width};transform:scale(${scale});transform-origin:top left}
        ${css}
      </style></head><body><div class="preview-viewport"><div class="preview-stage">${html}</div></div></body></html>`;
    }

    function renderCardPreviews(previewDocs) {
      previewDocs.forEach(({ idx, doc }) => {
        const frame = document.getElementById(`preview-frame-${idx}`);
        if (!frame || !doc) return;
        frame.srcdoc = doc;
      });
    }

    function getTagCounts() {
      const counts = {};
      items.forEach(it => {
        if (getTier(it) !== activeTier) return;
        splitTags(it.tags).forEach(tag => { counts[tag] = (counts[tag] || 0) + 1; });
      });
      return counts;
    }

    function renderTags() {
      const counts = getTagCounts();
      const tags = Object.keys(counts).sort((a, b) => counts[b] - counts[a] || a.localeCompare(b));

      if (!tags.length) {
        tagListEl.innerHTML = '<div class="empty">No tags in this plan.</div>';
        return;
      }

      tagListEl.innerHTML = tags.map(tag => `
        <button class="tag-btn ${activeTag === tag ? 'active' : ''}" onclick="setTag('${tag.replace(/'/g, "\\'")}')">
          <span>${escapeHtml(tag)}</span>
          <span class="count">${counts[tag]}</span>
        </button>
      `).join('');
    }

    window.setTag = function(tag) {
      activeTag = activeTag === tag ? '' : tag;
      render();
    };

    function matchesFilter(item) {
      const text = `${item.name || ''} ${item.tags || ''}`.toLowerCase();
      if (query && !text.includes(query)) return false;
      if (getTier(item) !== activeTier) return false;
      if (!activeTag) return true;
      return splitTags(item.tags).includes(activeTag);
    }

    function render() {
      renderTags();
      const filtered = items.filter(matchesFilter);
      const previewDocs = [];

      if (!filtered.length) {
        listEl.innerHTML = '<div class="empty">No matching examples.</div>';
        return;
      }

      if (selectedPreviewIdx == null || !items[selectedPreviewIdx]) {
        selectedPreviewIdx = items.indexOf(filtered[0]);
      }

      listEl.innerHTML = filtered.map((it) => {
        const idx = items.indexOf(it);
        const tier = getTier(it);
        const pv = extractPreviewFromJson(it.json);
        let previewDoc = '';
        try {
          const parsed = parseWebflowJSONForCanvas(it.json);
          previewDoc = buildPreviewDocument(parsed.html, parsed.css);
        } catch (_) {
          previewDoc = '';
        }
        previewDocs.push({ idx, doc: previewDoc });
        return `
          <article class="card" data-idx="${idx}">
            <div class="card-head">
              <div>
                <p class="name">${escapeHtml(it.name || 'Untitled')}</p>
                <p class="meta">${(it.json || '').length} chars</p>
              </div>
              <span class="plan-badge ${tier}">${escapeHtml(tier)}</span>
            </div>
            <div class="visual-preview">
              ${previewDoc
                ? `<iframe id="preview-frame-${idx}" class="visual-frame" title="${escapeHtml(it.name || 'Preview')}" loading="lazy"></iframe>`
                : `<div class="visual-fallback">Preview unavailable for this section.</div>`}
            </div>
            <div class="card-actions">
              <button class="primary" id="copy-btn-${idx}" onclick="copyItem(${idx})">Webflow</button>
            </div>
          </article>
        `;
      }).join('');

      renderCardPreviews(previewDocs);
    }

    function copyForWebflow(jsonText) {
      const payload = String(jsonText || '').trim();
      if (!payload) throw new Error('Empty payload');

      const onCopy = (event) => {
        if (!event.clipboardData) return;
        event.preventDefault();
        event.clipboardData.setData('application/json', payload);
        event.clipboardData.setData('text/plain', payload);
      };

      document.addEventListener('copy', onCopy);
      const ok = document.execCommand('copy');
      document.removeEventListener('copy', onCopy);

      if (!ok) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(payload);
        }
        throw new Error('Copy blocked');
      }
      return Promise.resolve();
    }

    window.copyItem = async function(idx) {
      const it = items[idx];
      if (!it) return;
      const btn = document.getElementById(`copy-btn-${idx}`);
      const previousLabel = btn ? btn.textContent : '';
      try {
        await copyForWebflow(it.json);
        if (btn) {
          btn.textContent = 'Copied';
          btn.disabled = true;
          setTimeout(() => {
            const currentBtn = document.getElementById(`copy-btn-${idx}`);
            if (!currentBtn) return;
            currentBtn.textContent = 'Webflow';
            currentBtn.disabled = false;
          }, 1400);
        }
        showStatus(`Copied for Webflow: ${it.name}`, false);
      } catch (e) {
        if (btn) btn.textContent = previousLabel || 'Webflow';
        showStatus(`Copy failed: ${e.message || 'unknown'}`, true);
      }
    };

    window.loadItem = function(idx) {
      const it = items[idx];
      if (!it) return;
      exName.value = it.name || '';
      exTags.value = it.tags || '';
      jsonInput.value = JSON.stringify(JSON.parse(it.json), null, 2);
      showStatus(`Loaded: ${it.name}`, false);
      dock.style.display = 'block';
    };

    window.deleteItem = function(idx) {
      const it = items[idx];
      if (!it) return;
      items.splice(idx, 1);
      if (selectedPreviewIdx === idx) selectedPreviewIdx = null;
      save();
      render();
      showStatus(`Deleted: ${it.name}`, false);
    };

    document.getElementById('saveBtn').addEventListener('click', () => {
      let name = exName.value.trim();
      const tags = exTags.value.trim();
      const raw = jsonInput.value.trim();
      if (!raw) {
        showStatus('JSON required hai.', true);
        return;
      }
      try {
        const normalized = normalizeJson(raw);
        if (!name) {
          const pv = extractPreviewFromJson(normalized);
          name = (pv && pv.title ? pv.title : 'Imported Example').slice(0, 80);
        }
        const idx = items.findIndex((x) => x.name.toLowerCase() === name.toLowerCase());
        const payload = { name, tags, json: normalized, updatedAt: Date.now() };
        if (idx >= 0) items[idx] = payload;
        else items.unshift(payload);
        save();
        render();
        showStatus(idx >= 0 ? 'Example updated.' : 'Example saved.', false);
        exName.value = '';
        exTags.value = '';
        jsonInput.value = '';
      } catch (_) {
        showStatus('Invalid JSON. Please paste valid Webflow JSON.', true);
      }
    });

    document.getElementById('pasteBtn').addEventListener('click', async () => {
      try {
        let raw = '';

        // Prefer structured clipboard formats from Webflow/third-party tools.
        if (navigator.clipboard && navigator.clipboard.read) {
          const items = await navigator.clipboard.read();
          for (const item of items) {
            if (item.types.includes('application/json')) {
              const blob = await item.getType('application/json');
              raw = await blob.text();
              break;
            }
          }
          if (!raw) {
            for (const item of items) {
              if (item.types.includes('text/plain')) {
                const blob = await item.getType('text/plain');
                raw = await blob.text();
                break;
              }
            }
          }
        }

        if (!raw && navigator.clipboard && navigator.clipboard.readText) {
          raw = await navigator.clipboard.readText();
        }

        raw = String(raw || '').trim();
        if (!raw) {
          showStatus('Clipboard empty hai.', true);
          return;
        }

        try {
          const normalized = normalizeJson(raw);
          jsonInput.value = JSON.stringify(JSON.parse(normalized), null, 2);
          showStatus('Clipboard JSON pasted.', false);
        } catch (_) {
          jsonInput.value = raw;
          showStatus('Clipboard pasted (non-JSON text).', true);
        }
      } catch (e) {
        showStatus(`Paste failed: ${e.message || 'permission denied'}`, true);
      }
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      exName.value = '';
      exTags.value = '';
      jsonInput.value = '';
      showStatus('Form cleared.', false);
    });

    jsonInput.addEventListener('paste', (e) => {
      const t = e.clipboardData && (e.clipboardData.getData('application/json') || e.clipboardData.getData('text/plain'));
      if (!t) return;
      e.preventDefault();
      try {
        const normalized = normalizeJson(t);
        jsonInput.value = JSON.stringify(JSON.parse(normalized), null, 2);
        showStatus('Pasted Webflow JSON from clipboard.', false);
      } catch (_) {
        jsonInput.value = t;
      }
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `webflow-json-examples-${Date.now()}.json`;
      a.click();
      showStatus('Export downloaded.', false);
    });

    document.getElementById('seedBtn').addEventListener('click', () => {
      if (items.length && !confirm('Current examples replace karke demo load karein?')) return;
      items = getDemoItems().map(it => ({ ...it, updatedAt: Date.now() }));
      save();
      render();
      showStatus('Demo examples loaded.', false);
    });

    document.getElementById('openDock').addEventListener('click', () => {
      dock.style.display = 'block';
      exName.focus();
    });

    document.getElementById('closeDock').addEventListener('click', () => {
      dock.style.display = 'none';
    });

    searchInput.addEventListener('input', (e) => {
      query = (e.target.value || '').trim().toLowerCase();
      render();
    });

    tierFilter.addEventListener('change', (e) => {
      activeTier = e.target.value || 'free';
      if (activeTag && !getTagCounts()[activeTag]) activeTag = '';
      render();
    });

    listEl.addEventListener('click', (e) => {
      const card = e.target.closest('.card[data-idx]');
      if (!card) return;
      const idx = Number(card.getAttribute('data-idx'));
      if (Number.isInteger(idx)) selectedPreviewIdx = idx;
    });

    previewCanvasBtn.addEventListener('click', () => {
      try {
        let target = items[selectedPreviewIdx];
        if (!target) {
          const filtered = items.filter(matchesFilter);
          if (!filtered.length) throw new Error('No example available for preview');
          target = filtered[0];
          selectedPreviewIdx = items.indexOf(target);
        }
        const parsed = parseWebflowJSONForCanvas(target.json);
        renderCanvasPreview(parsed.html, parsed.css);
        canvasMeta.textContent = `Preview: ${target.name || 'Untitled'} · nodes ${parsed.nodes.filter(n => !n.text).length} · styles ${parsed.styles.length}`;
        showStatus('Canvas preview rendered.', false);
      } catch (e) {
        canvasMeta.textContent = `Preview failed: ${e.message || 'unknown error'}`;
        showStatus(`Preview failed: ${e.message || 'unknown error'}`, true);
      }
    });

    load();
    render();
    loadProLibrary();
  </script>
</body>
