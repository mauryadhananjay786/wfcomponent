<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webflow JSON Gallery</title>
  <style>
    :root {
      --bg: #07090f;
      --bg2: #0a0d15;
      --panel: #0f121b;
      --panel2: #121726;
      --line: #262c3c;
      --line2: #30394f;
      --text: #e8edf8;
      --muted: #99a3ba;
      --blue: #5a62ff;
      --blue2: #7f86ff;
      --orange: #ff8a5b;
      --green: #23c38b;
      --danger: #ff6b6b;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 0% 0%, #1c2233 0%, var(--bg) 38%), linear-gradient(180deg, #0b0e16 0%, #07090f 100%);
      color: var(--text);
      font-family: "Satoshi", "Syne", "Segoe UI", system-ui, sans-serif;
    }

    .app {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: #0a0c12;
      border-right: 1px solid var(--line);
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -.02em;
      padding: 8px 10px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(90,98,255,.15), rgba(127,134,255,.06));
      border: 1px solid rgba(90,98,255,.32);
    }

    .brand-dot {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--blue), #8d65ff);
      box-shadow: 0 0 14px rgba(90,98,255,.5);
    }

    .plan-picker {
      display: grid;
      gap: 6px;
    }

    .plan-picker select {
      width: 100%;
      border: 1px solid var(--line2);
      border-radius: 9px;
      background: #0f1118;
      color: var(--text);
      padding: 9px 10px;
      font-size: 13px;
      outline: none;
    }

    .side-title {
      font-size: 11px;
      letter-spacing: .1em;
      color: var(--muted);
      text-transform: uppercase;
      margin: 4px 0 6px;
      padding: 0 8px;
    }

    .tag-list {
      display: grid;
      gap: 6px;
    }

    .tag-btn {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      color: #a9b0c2;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      text-transform: capitalize;
      font-size: 13px;
    }

    .tag-btn:hover { background: #111522; color: #d5ddf0; }
    .tag-btn.active {
      background: linear-gradient(135deg, rgba(90,98,255,.2), rgba(90,98,255,.08));
      border-color: rgba(90,98,255,.5);
      color: #fff;
    }

    .count {
      font-size: 11px;
      color: var(--muted);
      min-width: 18px;
      text-align: right;
    }

    .content {
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-width: 0;
    }

    .topbar {
      border-bottom: 1px solid var(--line);
      background: rgba(8,10,16,.92);
      backdrop-filter: blur(8px);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .search {
      flex: 1;
      min-width: 260px;
      max-width: 700px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line2);
      border-radius: 10px;
      background: #0f1118;
      padding: 8px 10px;
    }

    .search input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--line2);
      background: #141a2a;
      color: var(--text);
      border-radius: 9px;
      padding: 8px 11px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
    }

    .primary {
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      border-color: rgba(90,98,255,.5);
      color: white;
    }

    .danger {
      background: #2a1717;
      color: #ffc8c8;
      border-color: #6b2a2a;
    }

    .hero {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 6px;
    }

    .hero h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.1;
      color: #f2f5ff;
      letter-spacing: -.02em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      max-width: 840px;
      line-height: 1.5;
    }

    .board {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      align-content: start;
    }

    .canvas-zone {
      margin: 0 16px 16px;
      border: 1px solid var(--line2);
      border-radius: 12px;
      background: linear-gradient(180deg, #0f141f, #0b1018);
      overflow: hidden;
    }

    .canvas-head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .canvas-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .canvas-frame {
      width: 100%;
      height: 360px;
      border: none;
      display: block;
      background: #0a0a0a;
    }

    .card {
      border: 1px solid var(--line2);
      border-radius: 12px;
      background: linear-gradient(180deg, #101420, #0d121d);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 220px;
    }

    .card-head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .name {
      font-size: 14px;
      font-weight: 800;
      margin: 0;
    }

    .meta {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 11px;
    }

    .visual-preview {
      position: relative;
      border: 1px solid #1f2a42;
      border-radius: 10px;
      margin: 10px;
      min-height: 140px;
      overflow: hidden;
      background: linear-gradient(140deg, #161f34, #0f1421);
    }

    .visual-preview img {
      width: 100%;
      height: 100%;
      min-height: 140px;
      object-fit: cover;
      display: block;
      filter: saturate(1.05);
    }

    .visual-overlay {
      position: absolute;
      inset: auto 0 0 0;
      background: linear-gradient(180deg, transparent, rgba(6,10,18,.88));
      padding: 10px;
      display: grid;
      gap: 4px;
    }

    .pv-title {
      margin: 0;
      font-size: 13px;
      font-weight: 800;
      color: #f0f5ff;
      line-height: 1.3;
    }

    .pv-sub {
      margin: 0;
      font-size: 11px;
      color: #b3c3de;
      line-height: 1.35;
    }

    .pv-stats {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .pv-chip {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 999px;
      border: 1px solid #30435f;
      color: #b9c7df;
      background: rgba(14,23,38,.7);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 10px 8px;
    }

    .chip {
      font-size: 10px;
      padding: 3px 7px;
      border-radius: 999px;
      border: 1px solid #33405c;
      color: #9fb0ce;
      background: #11192a;
      text-transform: lowercase;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 0 10px 10px;
      margin-top: auto;
    }

    .empty {
      border: 1px dashed #314056;
      border-radius: 12px;
      color: var(--muted);
      padding: 16px;
      text-align: center;
    }

    .dock {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: min(430px, calc(100vw - 30px));
      display: none;
      background: #0f131f;
      border: 1px solid var(--line2);
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(0,0,0,.45);
      overflow: hidden;
      z-index: 20;
    }

    .dock-head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .dock-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .dock-body { padding: 10px; display: grid; gap: 8px; }

    .field {
      display: grid;
      gap: 4px;
    }

    .field label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }

    .field input, .field textarea {
      width: 100%;
      border: 1px solid var(--line2);
      border-radius: 9px;
      background: #0a101b;
      color: var(--text);
      padding: 9px;
      font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .field textarea { min-height: 120px; resize: vertical; }

    .dock-actions { display: flex; gap: 7px; flex-wrap: wrap; }
    .status { min-height: 16px; font-size: 12px; color: var(--muted); }
    .ok { color: #90e3c1 !important; }
    .bad { color: #ffb0b0 !important; }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--line); }
      .dock { position: static; width: auto; margin: 10px 16px 16px; }
      .content { grid-template-rows: auto auto auto 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><span class="brand-dot"></span><span>Flow Gallery</span></div>
      <div class="plan-picker">
        <div class="side-title">Plan</div>
        <select id="planSelect">
          <option value="basic">Basic</option>
          <option value="premium">Premium</option>
        </select>
      </div>
      <div>
        <div class="side-title">Filters</div>
        <div class="tag-list" id="tagList"></div>
      </div>
    </aside>

    <section class="content">
      <div class="topbar">
        <div class="search">
          <span>🔎</span>
          <input id="searchInput" type="text" placeholder="Search examples by name or tags..." />
        </div>
        <div class="toolbar">
          <button id="openDock" class="primary">+ Add Example</button>
          <button id="premiumImportBtn" hidden>Import Excel / CSV</button>
          <button id="sampleFileBtn" hidden>Example File</button>
          <button id="allExamplesBtn">Load All Examples</button>
          <button id="exportBtn">Export Excel</button>
        </div>
      </div>

      <div class="hero">
        <h1>Webflow Section JSON Gallery</h1>
        <p>Webflow se copied section JSON yahan save karo. Har card ke niche <b>Copy JSON</b> button hai jo direct Webflow-compatible clipboard format me copy karta hai.</p>
      </div>

      <div class="board" id="list"></div>
      <div class="canvas-zone">
        <div class="canvas-head">
          <button id="previewCanvasBtn" class="primary">Show Canvas Preview</button>
          <div class="canvas-meta" id="canvasMeta">No preview yet.</div>
        </div>
        <iframe id="canvasFrame" class="canvas-frame" title="Canvas Preview"></iframe>
      </div>
    </section>
  </div>

  <div class="dock" id="dock">
    <div class="dock-head">
      <div class="dock-title">Add / Update Example</div>
      <button id="closeDock">✕</button>
    </div>
    <div class="dock-body">
      <div class="field">
        <label for="exName">Example Name</label>
        <input id="exName" type="text" placeholder="Hero Section v1" />
      </div>
      <div class="field">
        <label for="exTags">Tags (comma-separated)</label>
        <input id="exTags" type="text" placeholder="hero, navbar, pricing" />
      </div>
      <div class="field">
        <label for="jsonInput">Webflow JSON</label>
        <textarea id="jsonInput" placeholder='{"type":"@webflow/XscpData","payload":{...}}'></textarea>
      </div>
      <div class="dock-actions">
        <button class="primary" id="saveBtn">Save Example</button>
        <button id="pasteBtn">Paste Clipboard</button>
        <button id="clearBtn">Clear</button>
      </div>
      <div class="status" id="status">Ready.</div>
    </div>
  </div>

  <input id="importFileInput" type="file" accept=".xlsx,.xls,.csv,.tsv,.json" hidden />

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script>
    const KEY = 'wf_json_examples_v1';

    const listEl = document.getElementById('list');
    const tagListEl = document.getElementById('tagList');
    const statusEl = document.getElementById('status');
    const exName = document.getElementById('exName');
    const exTags = document.getElementById('exTags');
    const jsonInput = document.getElementById('jsonInput');
    const searchInput = document.getElementById('searchInput');
    const planSelect = document.getElementById('planSelect');
    const premiumImportBtn = document.getElementById('premiumImportBtn');
    const sampleFileBtn = document.getElementById('sampleFileBtn');
    const importFileInput = document.getElementById('importFileInput');
    const dock = document.getElementById('dock');
    const previewCanvasBtn = document.getElementById('previewCanvasBtn');
    const canvasMeta = document.getElementById('canvasMeta');
    const canvasFrame = document.getElementById('canvasFrame');

    let items = [];
    let activeTag = 'all';
    let activePlan = 'basic';
    let query = '';
    let selectedPreviewIdx = null;

    function normalizeItem(item) {
      return {
        ...item,
        plan: item && item.plan === 'premium' ? 'premium' : 'basic'
      };
    }

    function showStatus(msg, bad) {
      statusEl.textContent = msg;
      statusEl.className = bad ? 'status bad' : 'status ok';
    }

    function updatePremiumUI() {
      const showPremiumActions = activePlan === 'premium';
      premiumImportBtn.hidden = !showPremiumActions;
      sampleFileBtn.hidden = !showPremiumActions;
    }

    function load() {
      try {
        const raw = localStorage.getItem(KEY);
        if (!raw) { items = []; return; }
        const parsed = JSON.parse(raw);
        items = Array.isArray(parsed) ? parsed.map(normalizeItem) : [];
      } catch (_) {
        items = [];
      }
    }

    function save() {
      localStorage.setItem(KEY, JSON.stringify(items.map(normalizeItem)));
    }

    function xmlEscape(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function downloadExcelFallback(rows) {
      const headers = ['Example Name', 'Tags', 'Webflow JSON'];
      const xmlRows = [
        `<Row>${headers.map((header) => `<Cell><Data ss:Type="String">${xmlEscape(header)}</Data></Cell>`).join('')}</Row>`,
        ...rows.map((row) => `<Row>${headers.map((header) => `<Cell><Data ss:Type="String">${xmlEscape(row[header] || '')}</Data></Cell>`).join('')}</Row>`)
      ].join('');

      const xml = `<?xml version="1.0"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
 xmlns:o="urn:schemas-microsoft-com:office:office"
 xmlns:x="urn:schemas-microsoft-com:office:excel"
 xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
 <Worksheet ss:Name="Examples">
  <Table>${xmlRows}</Table>
 </Worksheet>
</Workbook>`;

      const blob = new Blob([xml], { type: 'application/vnd.ms-excel;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `webflow-json-examples-${Date.now()}.xls`;
      a.click();
    }

    function slugifyHeader(key) {
      return String(key || '')
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '');
    }

    function parseDelimitedText(text) {
      const src = String(text || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      const firstLine = src.split('\n').find(line => line.trim());
      const delimiter = firstLine && firstLine.includes('\t') ? '\t' : ',';
      const rows = [];
      let row = [];
      let cell = '';
      let inQuotes = false;

      for (let i = 0; i < src.length; i += 1) {
        const ch = src[i];
        if (inQuotes) {
          if (ch === '"') {
            if (src[i + 1] === '"') {
              cell += '"';
              i += 1;
            } else {
              inQuotes = false;
            }
          } else {
            cell += ch;
          }
          continue;
        }

        if (ch === '"') {
          inQuotes = true;
          continue;
        }
        if (ch === delimiter) {
          row.push(cell);
          cell = '';
          continue;
        }
        if (ch === '\n') {
          row.push(cell);
          rows.push(row);
          row = [];
          cell = '';
          continue;
        }
        cell += ch;
      }

      if (cell || row.length) {
        row.push(cell);
        rows.push(row);
      }

      if (!rows.length) return [];

      const headers = rows[0].map(slugifyHeader);
      return rows
        .slice(1)
        .filter(cols => cols.some(value => String(value || '').trim()))
        .map(cols => headers.reduce((acc, header, index) => {
          acc[header || `column${index + 1}`] = String(cols[index] || '').trim();
          return acc;
        }, {}));
    }

    async function parseImportRows(file) {
      const name = String(file?.name || '').toLowerCase();
      if (name.endsWith('.csv') || name.endsWith('.tsv') || name.endsWith('.txt')) {
        return parseDelimitedText(await file.text());
      }
      if (name.endsWith('.json')) {
        const parsed = JSON.parse(await file.text());
        return Array.isArray(parsed) ? parsed : [];
      }
      if ((name.endsWith('.xlsx') || name.endsWith('.xls')) && window.XLSX) {
        const workbook = window.XLSX.read(await file.arrayBuffer(), { type: 'array' });
        const sheetName = workbook.SheetNames[0];
        if (!sheetName) return [];
        return window.XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { defval: '' });
      }
      if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
        throw new Error('Excel parser load nahi hua. Internet on karke page reload karo.');
      }
      throw new Error('Unsupported file type. .xlsx, .xls, .csv, .tsv ya .json use karo.');
    }

    function getRowValue(row, keys) {
      for (const key of keys) {
        const match = Object.keys(row || {}).find(col => slugifyHeader(col) === slugifyHeader(key));
        if (match && String(row[match] || '').trim()) return String(row[match]).trim();
      }
      return '';
    }

    function makeExampleFromImportRow(row, index) {
      const name = getRowValue(row, ['name', 'title', 'example name']);
      const tags = getRowValue(row, ['tags', 'tag']);
      const rawJson = getRowValue(row, ['json', 'webflowjson', 'payload']);
      const planValue = getRowValue(row, ['plan', 'tier']);

      if (!rawJson) {
        throw new Error(`Row ${index + 2}: Webflow JSON required hai.`);
      }

      const json = normalizeJson(rawJson);

      return normalizeItem({
        name: name || `Imported Example ${index + 1}`,
        tags,
        json,
        updatedAt: Date.now() + index,
        plan: planValue === 'basic' || planValue === 'premium' ? planValue : activePlan
      });
    }

    function escapeHtml(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function normalizeJson(text) {
      const parsed = JSON.parse(text);

      // Support wrapped API format: {"code":"{...@webflow/XscpData...}"}
      if (parsed && typeof parsed.code === 'string') {
        const inner = JSON.parse(parsed.code);
        return JSON.stringify(inner);
      }

      // Support nested payload wrappers if any source sends them.
      if (parsed && parsed.payload && typeof parsed.payload.code === 'string') {
        const inner = JSON.parse(parsed.payload.code);
        return JSON.stringify(inner);
      }

      return JSON.stringify(parsed);
    }

    function wfId() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    function makeDemoJson(headline, sub, image) {
      const sectionId = wfId();
      const containerId = wfId();
      const hId = wfId();
      const pId = wfId();
      const imgId = wfId();
      const t1 = wfId();
      const t2 = wfId();
      const clsSection = wfId();
      const clsContainer = wfId();
      const clsTitle = wfId();
      const clsSub = wfId();
      const clsImg = wfId();

      return JSON.stringify({
        type: "@webflow/XscpData",
        payload: {
          nodes: [
            { _id: sectionId, type: "Section", tag: "section", classes: [clsSection], children: [containerId], data: { tag: "section", devlink: { runtimeProps: {}, slot: "" }, displayName: "", attr: { id: "" }, xattr: [], search: { exclude: false }, visibility: { conditions: [] } } },
            { _id: containerId, type: "Block", tag: "div", classes: [clsContainer], children: [hId, pId, imgId], data: { text: false, tag: "div", devlink: { runtimeProps: {}, slot: "" }, displayName: "", attr: { id: "" }, xattr: [], search: { exclude: false }, visibility: { conditions: [] } } },
            { _id: hId, type: "Heading", tag: "h2", classes: [clsTitle], children: [t1], data: { tag: "h2", devlink: { runtimeProps: {}, slot: "" }, displayName: "", attr: { id: "" }, xattr: [], search: { exclude: false }, visibility: { conditions: [] } } },
            { _id: t1, text: true, v: headline },

        };
      } catch (_) {
        return { title: 'Saved JSON', sub: 'Unable to parse preview for this item.', image: '', nodes: 0, styles: 0 };
      }
    }

    function tryPrettyJson(raw) {
      const parsed = JSON.parse(raw);
      return JSON.stringify(parsed, null, 2);
    }

    function splitTags(tags) {
      return String(tags || '')
        .split(',')
        .map(t => t.trim().toLowerCase())
        .filter(Boolean);
    }

    function buildIdMap(arr) {
      const m = {};
      (arr || []).forEach(x => { m[x._id] = x; });
      return m;
    }

    function buildClassMap(styles) {
      const m = {};
      (styles || []).forEach(s => { m[s._id] = { name: s.name, styleLess: s.styleLess || "" }; });
      return m;
    }

    function buildAssetMap(assets) {
      const m = {};
      (assets || []).forEach(a => { m[a._id] = a.cdnUrl || a.s3Url || ""; });
      return m;
    }

    function resolveAssetTokens(css, assetMap) {
      let out = String(css || "").replace(/@raw<\|([^|]*)\|>/g, (_, val) => val);
      out = out.replace(/@img_([a-f0-9]+)/gi, (_, id) => {
        const url = assetMap[id] || Object.entries(assetMap).find(([k]) => k.includes(id))?.[1] || "";
        return url ? `url('${url}')` : "none";
      });
      return out;
    }

    const TAG_MAP = {
      Block: "div", Section: "div", Container: "div", Heading: null, Paragraph: "p", Image: "img",
      Link: "a", Button: "a", List: "ul", ListItem: "li", RichText: "div", Span: "span"
    };

    function resolveTag(node) {
      if (node.tag) return node.tag;
      if (node.type === "Heading") return `h${node.data?.level || 2}`;
      return TAG_MAP[node.type] || "div";
    }

    function renderNode(nodeId, nodeMap, classMap, assetMap) {
      const node = nodeMap[nodeId];
      if (!node) return "";
      if (node.text === true) return node.v != null ? String(node.v) : "";

      if (node.type === "HtmlEmbed") {
        const html = node.v || node.data?.embed?.meta?.html || "";
        if (String(html).trim().startsWith("<script")) return "";
        const cls = (node.classes || []).map(id => classMap[id]?.name).filter(Boolean).join(" ");
        return `<div${cls ? ` class="${cls}"` : ""}>${html}</div>`;
      }

      let tag = node.tag;
      if (!tag) {
        if (node.type === "DOM") tag = node.data?.tag || "div";
        else if (node.type === "Heading") tag = `h${node.data?.level || 2}`;
        else tag = TAG_MAP[node.type] || "div";
      }

      const classNames = (node.classes || []).map(id => classMap[id]?.name).filter(Boolean).join(" ");
      const classAttr = classNames ? ` class="${classNames}"` : "";
      let extra = "";
      if (tag === "a") extra += ` href="${node.data?.attr?.href || node.data?.link?.url || "#"}"`;

      const xattrs = node.data?.xattr || [];
      xattrs.forEach(x => { if (x.name) extra += ` ${x.name}="${x.value || ""}"`; });
      const domAttrs = node.data?.attributes || [];
      domAttrs.forEach(a => { if (a.name) extra += ` ${a.name}="${a.value || ""}"`; });

      if (tag === "img") {
        const src = node.data?.attr?.src || (node.data?.img?.id ? (assetMap[node.data.img.id] || "") : "");
        return `<img${classAttr} src="${src}" alt="${node.data?.attr?.alt || ""}" style="display:block;max-width:100%;width:auto;height:auto;" />`;
      }

      const inner = (node.children || []).map(cid => renderNode(cid, nodeMap, classMap, assetMap)).join("");
      return `<${tag}${classAttr}${extra}>${inner}</${tag}>`;
    }

    function parseWebflowJSONForCanvas(input) {
      let p = typeof input === "string" ? JSON.parse(input) : input;
      if (!p?.payload) {
        if (p?.nodes) p = { type: "@webflow/XscpData", payload: p };
        else throw new Error("Missing payload — not valid Webflow JSON");
      }
      const { nodes = [], styles = [], assets = [] } = p.payload;
      if (!nodes.length) throw new Error("No nodes found");

      const nodeMap = buildIdMap(nodes);
      const classMap = buildClassMap(styles);
      const assetMap = buildAssetMap(assets);
      const allChildIds = new Set(nodes.flatMap(n => n.text ? [] : (n.children || [])));
      const roots = nodes.filter(n => !n.text && !allChildIds.has(n._id));
      const html = roots.map(n => renderNode(n._id, nodeMap, classMap, assetMap)).join("\n");

      const cssRules = [];
      const seen = new Set();
      styles.forEach(s => {
        if (!s.name || seen.has(s.name) || !s.styleLess?.trim()) return;
        seen.add(s.name);
        const css = resolveAssetTokens(s.styleLess, assetMap);
        const rules = css.split(";").map(r => r.trim()).filter(Boolean).map(r => "  " + r + ";").join("\n");
        cssRules.push(`.${s.name} {\n${rules}\n}`);
        if (s.variants) {
          Object.entries(s.variants).forEach(([v, vd]) => {
            if (!vd.styleLess) return;
            const pseudo = v.includes("hover") ? ":hover" : v.includes("active") ? ":active" : "";
            if (!pseudo) return;
            const vr = resolveAssetTokens(vd.styleLess, assetMap).split(";").map(r => r.trim()).filter(Boolean).map(r => "  " + r + ";").join("\n");
            cssRules.push(`.${s.name}${pseudo} {\n${vr}\n}`);
          });
        }
      });

      return { html, css: cssRules.join("\n\n"), nodes, styles };
    }

    function renderCanvasPreview(html, css) {
      const doc = canvasFrame.contentDocument || canvasFrame.contentWindow?.document;
      if (!doc) throw new Error("Preview frame unavailable");
      doc.open();
      doc.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><style>*{box-sizing:border-box;margin:0;padding:0}html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#fff;}${css}</style></head><body>${html}</body></html>`);
      doc.close();
    }

    function getTagCounts() {
      const scoped = items.filter(it => normalizeItem(it).plan === activePlan);
      const counts = { all: scoped.length };
      scoped.forEach(it => {
        splitTags(it.tags).forEach(tag => { counts[tag] = (counts[tag] || 0) + 1; });
      });
      return counts;
    }

    function renderTags() {
      const counts = getTagCounts();
      const tags = Object.keys(counts).sort((a, b) => (a === 'all' ? -1 : b === 'all' ? 1 : counts[b] - counts[a]));

      tagListEl.innerHTML = tags.map(tag => `
        <button class="tag-btn ${activeTag === tag ? 'active' : ''}" onclick="setTag('${tag.replace(/'/g, "\\'")}')">
          <span>${escapeHtml(tag)}</span>
          <span class="count">${counts[tag]}</span>
        </button>
      `).join('');
    }

    window.setTag = function(tag) {
      activeTag = tag;
      render();
    };

    function matchesFilter(item) {
      if (normalizeItem(item).plan !== activePlan) return false;
      const text = `${item.name || ''} ${item.tags || ''}`.toLowerCase();
      if (query && !text.includes(query)) return false;
      if (activeTag === 'all') return true;
      return splitTags(item.tags).includes(activeTag);
    }

    function render() {
      renderTags();
      const filtered = items.filter(matchesFilter);

      if (!filtered.length) {
        listEl.innerHTML = '<div class="empty">No matching examples.</div>';
        return;
      }

      if (selectedPreviewIdx == null || !items[selectedPreviewIdx]) {
        selectedPreviewIdx = items.indexOf(filtered[0]);
      }

      listEl.innerHTML = filtered.map((it) => {
        const idx = items.indexOf(it);
        const tags = splitTags(it.tags);
        const pv = extractPreviewFromJson(it.json);
        return `
          <article class="card" data-idx="${idx}">
            <div class="card-head">
              <div>
                <p class="name">${escapeHtml(it.name || 'Untitled')}</p>
                <p class="meta">${(it.json || '').length} chars</p>
              </div>
            </div>
            <div class="visual-preview">
              ${pv.image ? `<img src="${escapeHtml(pv.image)}" alt="">` : ''}
              <div class="visual-overlay">
                <p class="pv-title">${escapeHtml(pv.title)}</p>
                <p class="pv-sub">${escapeHtml((pv.sub || '').slice(0, 110))}</p>
                <div class="pv-stats">
                  <span class="pv-chip">nodes: ${pv.nodes}</span>
                  <span class="pv-chip">styles: ${pv.styles}</span>
                </div>
              </div>
            </div>
            <div class="tags">${tags.map(t => `<span class="chip">${escapeHtml(t)}</span>`).join('')}</div>
            <div class="card-actions">
              <button class="primary" onclick="copyItem(${idx})">Copy JSON</button>
              <button onclick="loadItem(${idx})">Edit</button>
              <button class="danger" onclick="deleteItem(${idx})">Delete</button>
            </div>
          </article>
        `;
      }).join('');
    }

    function copyForWebflow(jsonText) {
      const payload = String(jsonText || '').trim();
      if (!payload) throw new Error('Empty payload');

      const onCopy = (event) => {
        if (!event.clipboardData) return;
        event.preventDefault();
        event.clipboardData.setData('application/json', payload);
        event.clipboardData.setData('text/plain', payload);
      };

      document.addEventListener('copy', onCopy);
      const ok = document.execCommand('copy');
      document.removeEventListener('copy', onCopy);

      if (!ok) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(payload);
        }
        throw new Error('Copy blocked');
      }
      return Promise.resolve();
    }

    window.copyItem = async function(idx) {
      const it = items[idx];
      if (!it) return;
      try {
        await copyForWebflow(it.json);
        showStatus(`Copied for Webflow: ${it.name}`, false);
      } catch (e) {
        showStatus(`Copy failed: ${e.message || 'unknown'}`, true);
      }
    };

    window.loadItem = function(idx) {
      const it = items[idx];
      if (!it) return;
      exName.value = it.name || '';
      exTags.value = it.tags || '';
      jsonInput.value = JSON.stringify(JSON.parse(it.json), null, 2);
      showStatus(`Loaded: ${it.name}`, false);
      dock.style.display = 'block';
    };

    window.deleteItem = function(idx) {
      const it = items[idx];
      if (!it) return;
      items.splice(idx, 1);
      if (selectedPreviewIdx === idx) selectedPreviewIdx = null;
      save();
      render();
      showStatus(`Deleted: ${it.name}`, false);
    };

    document.getElementById('saveBtn').addEventListener('click', () => {
      let name = exName.value.trim();
      const tags = exTags.value.trim();
      const raw = jsonInput.value.trim();
      if (!raw) {
        showStatus('JSON required hai.', true);
        return;
      }
      try {
        const normalized = normalizeJson(raw);
        if (!name) {
          const pv = extractPreviewFromJson(normalized);
          name = (pv && pv.title ? pv.title : 'Imported Example').slice(0, 80);
        }
        const idx = items.findIndex((x) => x.name.toLowerCase() === name.toLowerCase());
        const payload = {
          name,
          tags,
          json: normalized,
          updatedAt: Date.now(),
          plan: idx >= 0 ? normalizeItem(items[idx]).plan : activePlan
        };
        if (idx >= 0) items[idx] = payload;
        else items.unshift(payload);
        save();
        render();
        showStatus(idx >= 0 ? 'Example updated.' : 'Example saved.', false);
        exName.value = '';
        exTags.value = '';
        jsonInput.value = '';
      } catch (_) {
        showStatus('Invalid JSON. Please paste valid Webflow JSON.', true);
      }
    });

    document.getElementById('pasteBtn').addEventListener('click', async () => {
      try {
        let raw = '';

        // Prefer structured clipboard formats from Webflow/third-party tools.
        if (navigator.clipboard && navigator.clipboard.read) {
          const items = await navigator.clipboard.read();
          for (const item of items) {
            if (item.types.includes('application/json')) {
              const blob = await item.getType('application/json');
              raw = await blob.text();
              break;
            }
          }
          if (!raw) {
            for (const item of items) {
              if (item.types.includes('text/plain')) {
                const blob = await item.getType('text/plain');
                raw = await blob.text();
                break;
              }
            }
          }
        }

        if (!raw && navigator.clipboard && navigator.clipboard.readText) {
          raw = await navigator.clipboard.readText();
        }

        raw = String(raw || '').trim();
        if (!raw) {
          showStatus('Clipboard empty hai.', true);
          return;
        }

        try {
          const normalized = normalizeJson(raw);
          jsonInput.value = JSON.stringify(JSON.parse(normalized), null, 2);
          showStatus('Clipboard JSON pasted.', false);
        } catch (_) {
          jsonInput.value = raw;
          showStatus('Clipboard pasted (non-JSON text).', true);
        }
      } catch (e) {
        showStatus(`Paste failed: ${e.message || 'permission denied'}`, true);
      }
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      exName.value = '';
      exTags.value = '';
      jsonInput.value = '';
      showStatus('Form cleared.', false);
    });

    jsonInput.addEventListener('paste', (e) => {
      const t = e.clipboardData && (e.clipboardData.getData('application/json') || e.clipboardData.getData('text/plain'));
      if (!t) return;
      e.preventDefault();
      try {
        const normalized = normalizeJson(t);
        jsonInput.value = JSON.stringify(JSON.parse(normalized), null, 2);
        showStatus('Pasted Webflow JSON from clipboard.', false);
      } catch (_) {
        jsonInput.value = t;
      }
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
      const rows = items.map((item) => ({
        'Example Name': item.name || '',
        'Tags': item.tags || '',
        'Webflow JSON': item.json || ''
      }));
      const exportRows = rows.length ? rows : [{
        'Example Name': '',
        'Tags': '',
        'Webflow JSON': ''
      }];

      if (window.XLSX) {
        const worksheet = window.XLSX.utils.json_to_sheet(exportRows);
        const workbook = window.XLSX.utils.book_new();
        window.XLSX.utils.book_append_sheet(workbook, worksheet, 'Examples');
        window.XLSX.writeFile(workbook, `webflow-json-examples-${Date.now()}.xlsx`);
        showStatus('Excel export downloaded.', false);
        return;
      }

      downloadExcelFallback(exportRows);
      showStatus('Excel export downloaded (.xls fallback).', false);
    });

    document.getElementById('allExamplesBtn').addEventListener('click', () => {
      const presetItems = getAllPresetItems();
      if (items.length && !confirm(`Current examples replace karke saare ${presetItems.length} combined examples load karein?`)) return;
      items = presetItems.map(it => ({ ...it, updatedAt: Date.now() }));
      save();
      render();
      showStatus(`All combined examples loaded (${presetItems.length}).`, false);
    });

    document.getElementById('openDock').addEventListener('click', () => {
      dock.style.display = 'block';
      exName.focus();
    });

    premiumImportBtn.addEventListener('click', () => {
      importFileInput.value = '';
      importFileInput.click();
    });

    sampleFileBtn.addEventListener('click', () => {
      const a = document.createElement('a');
      a.href = './premium-import-sample.xlsx';
      a.download = 'premium-import-sample.xlsx';
      a.click();
    });

    importFileInput.addEventListener('change', async (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;

      try {
        const rows = await parseImportRows(file);
        if (!rows.length) throw new Error('Import file empty hai.');

        let added = 0;
        let updated = 0;
        rows.forEach((row, index) => {
          const payload = makeExampleFromImportRow(row, index);
          const existingIdx = items.findIndex((item) => item.name.toLowerCase() === payload.name.toLowerCase());
          if (existingIdx >= 0) {
            items[existingIdx] = payload;
            updated += 1;
          } else {
            items.unshift(payload);
            added += 1;
          }
        });

        save();
        render();
        showStatus(`Import complete: ${added} added, ${updated} updated.`, false);
      } catch (error) {
        showStatus(`Import failed: ${error.message || 'unknown error'}`, true);
      }
    });

    document.getElementById('closeDock').addEventListener('click', () => {
      dock.style.display = 'none';
    });

    searchInput.addEventListener('input', (e) => {
      query = (e.target.value || '').trim().toLowerCase();
      render();
    });

    planSelect.addEventListener('change', (e) => {
      activePlan = e.target.value === 'premium' ? 'premium' : 'basic';
      activeTag = 'all';
      selectedPreviewIdx = null;
      updatePremiumUI();
      render();
    });

    listEl.addEventListener('click', (e) => {
      const card = e.target.closest('.card[data-idx]');
      if (!card) return;
      const idx = Number(card.getAttribute('data-idx'));
      if (Number.isInteger(idx)) selectedPreviewIdx = idx;
    });

    previewCanvasBtn.addEventListener('click', () => {
      try {
        let target = items[selectedPreviewIdx];
        if (!target) {
          const filtered = items.filter(matchesFilter);
          if (!filtered.length) throw new Error('No example available for preview');
          target = filtered[0];
          selectedPreviewIdx = items.indexOf(target);
        }
        const parsed = parseWebflowJSONForCanvas(target.json);
        renderCanvasPreview(parsed.html, parsed.css);
        canvasMeta.textContent = `Preview: ${target.name || 'Untitled'} · nodes ${parsed.nodes.filter(n => !n.text).length} · styles ${parsed.styles.length}`;
        showStatus('Canvas preview rendered.', false);
      } catch (e) {
        canvasMeta.textContent = `Preview failed: ${e.message || 'unknown error'}`;
        showStatus(`Preview failed: ${e.message || 'unknown error'}`, true);
      }
    });
    load();
    updatePremiumUI();
    render();
  </script>
</body>
</html>
